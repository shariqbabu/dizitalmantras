<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Analyst Interview — Industry Level</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d0d0d;
    --paper: #f5f0e8;
    --accent: #c8401b;
    --accent2: #1b6dc8;
    --muted: #7a7060;
    --card: #ffffff;
    --border: #d4cfc4;
    --tag-sql: #fff3e0;
    --tag-stat: #e8f5e9;
    --tag-biz: #e3f2fd;
    --tag-py: #fce4ec;
    --tag-viz: #f3e5f5;
    --tag-beh: #e8eaf6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 48px 40px 36px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.12;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -80px; left: 20%;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: var(--accent2);
    opacity: 0.10;
  }
  .header-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 6vw, 3.6rem);
    line-height: 1.1;
    font-weight: 400;
    max-width: 700px;
  }
  header h1 em {
    color: var(--accent);
    font-style: italic;
  }
  .header-sub {
    margin-top: 16px;
    font-size: 14px;
    color: #aaa8a0;
    font-family: 'IBM Plex Mono', monospace;
    max-width: 520px;
    line-height: 1.6;
  }
  .stats-row {
    display: flex;
    gap: 32px;
    margin-top: 28px;
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-num {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--paper);
    line-height: 1;
  }
  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #888;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* CONTROLS */
  .controls {
    padding: 24px 40px;
    background: var(--ink);
    border-top: 1px solid #222;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #666;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-right: 4px;
  }
  .filter-btn {
    padding: 7px 16px;
    border-radius: 999px;
    border: 1.5px solid #333;
    background: transparent;
    color: #aaa;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .filter-btn[data-cat="SQL"].active { background: #e67e22; border-color: #e67e22; }
  .filter-btn[data-cat="Statistics"].active { background: #27ae60; border-color: #27ae60; }
  .filter-btn[data-cat="Business"].active { background: #2980b9; border-color: #2980b9; }
  .filter-btn[data-cat="Python/R"].active { background: #c0392b; border-color: #c0392b; }
  .filter-btn[data-cat="Visualization"].active { background: #8e44ad; border-color: #8e44ad; }
  .filter-btn[data-cat="Behavioral"].active { background: #2c3e50; border-color: #2c3e50; }

  /* DIFFICULTY FILTER */
  .diff-group { display: flex; gap: 8px; align-items: center; margin-left: auto; }
  .diff-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1.5px solid #333;
    background: transparent;
    color: #666;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .diff-btn:hover, .diff-btn.active { background: #1a1a1a; color: var(--paper); border-color: #555; }
  .diff-btn[data-diff="Junior"].active { color: #2ecc71; border-color: #2ecc71; }
  .diff-btn[data-diff="Mid"].active { color: #f39c12; border-color: #f39c12; }
  .diff-btn[data-diff="Senior"].active { color: var(--accent); border-color: var(--accent); }

  /* MAIN GRID */
  main {
    padding: 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* QUESTION CARD */
  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.4s ease both;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.10);
  }
  .card.hidden { display: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 18px 20px 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 4px;
  }
  .tag-SQL { background: var(--tag-sql); color: #e67e22; }
  .tag-Statistics { background: var(--tag-stat); color: #27ae60; }
  .tag-Business { background: var(--tag-biz); color: #2980b9; }
  .tag-PythonR { background: var(--tag-py); color: #c0392b; }
  .tag-Visualization { background: var(--tag-viz); color: #8e44ad; }
  .tag-Behavioral { background: var(--tag-beh); color: #2c3e50; }

  .diff-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 3px 10px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .diff-Junior { background: #e8f8f0; color: #2ecc71; }
  .diff-Mid { background: #fef9e7; color: #e67e22; }
  .diff-Senior { background: #fdf0ee; color: var(--accent); }

  .card-body { padding: 18px 20px; flex: 1; }
  .q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.08em;
  }
  .question {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    line-height: 1.45;
    color: var(--ink);
    font-weight: 400;
  }

  /* ANSWER TOGGLE */
  .answer-toggle {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    background: #fafaf8;
    transition: background 0.2s;
  }
  .answer-toggle:hover { background: #f0ede8; }
  .toggle-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .toggle-icon {
    width: 22px; height: 22px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.25s, border-color 0.2s;
  }
  .answer-toggle.open .toggle-icon { transform: rotate(180deg); border-color: var(--accent); color: var(--accent); }

  .answer-body {
    display: none;
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    background: #fcfbf9;
  }
  .answer-body.open { display: block; animation: slideDown 0.2s ease; }
  @keyframes slideDown { from { opacity: 0; } to { opacity: 1; } }

  .answer-body p {
    font-size: 13.5px;
    line-height: 1.7;
    color: #444;
    margin-bottom: 10px;
  }
  .answer-body p:last-child { margin-bottom: 0; }
  .answer-body code {
    background: #f0ede8;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent);
  }
  .answer-body pre {
    background: var(--ink);
    color: #a8e6cf;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 14px 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 10px 0;
    line-height: 1.6;
  }
  .answer-body ul {
    list-style: none;
    padding: 0;
    margin: 6px 0;
  }
  .answer-body ul li {
    font-size: 13.5px;
    line-height: 1.65;
    color: #444;
    padding-left: 16px;
    position: relative;
    margin-bottom: 4px;
  }
  .answer-body ul li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-size: 11px; top: 2px; }

  /* COUNT BAR */
  .count-bar {
    background: var(--ink);
    padding: 12px 40px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #555;
    letter-spacing: 0.08em;
    border-top: 1px solid #1a1a1a;
  }
  #visible-count { color: var(--paper); font-weight: 600; }

  /* NO RESULTS */
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    display: none;
  }
  .no-results.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="header-label">// Interview Prep Kit</div>
  <h1>Data Analyst<br><em>Interview Questions</em></h1>
  <p class="header-sub">Industry-level questions across SQL, Statistics, Business Acumen, Python/R, Visualization & Behavioral — with model answers.</p>
  <div class="stats-row">
    <div class="stat"><span class="stat-num">40</span><span class="stat-label">Questions</span></div>
    <div class="stat"><span class="stat-num">6</span><span class="stat-label">Categories</span></div>
    <div class="stat"><span class="stat-num">3</span><span class="stat-label">Levels</span></div>
  </div>
</header>

<div class="count-bar">Showing <span id="visible-count">40</span> of 40 questions</div>

<div class="controls">
  <span class="filter-label">Category:</span>
  <button class="filter-btn active" data-cat="All">All</button>
  <button class="filter-btn" data-cat="SQL">SQL</button>
  <button class="filter-btn" data-cat="Statistics">Statistics</button>
  <button class="filter-btn" data-cat="Business">Business</button>
  <button class="filter-btn" data-cat="Python/R">Python/R</button>
  <button class="filter-btn" data-cat="Visualization">Visualization</button>
  <button class="filter-btn" data-cat="Behavioral">Behavioral</button>
  <div class="diff-group">
    <button class="diff-btn active" data-diff="All">All Levels</button>
    <button class="diff-btn" data-diff="Junior">Junior</button>
    <button class="diff-btn" data-diff="Mid">Mid</button>
    <button class="diff-btn" data-diff="Senior">Senior</button>
  </div>
</div>

<main id="grid">
<div class="no-results" id="no-results">No questions match your filters.</div>
</main>

<script>
const questions = [
  // ─── SQL ───
  {cat:"SQL", diff:"Junior", q:"What is the difference between WHERE and HAVING in SQL?",
   a:`<p><code>WHERE</code> filters rows <em>before</em> aggregation; <code>HAVING</code> filters <em>after</em> aggregation.</p><pre>SELECT department, COUNT(*) AS cnt
FROM employees
WHERE salary > 40000        -- row-level filter
GROUP BY department
HAVING COUNT(*) > 5;        -- group-level filter</pre><p>Use <code>HAVING</code> only with <code>GROUP BY</code> when you need to filter on an aggregate function.</p>`},

  {cat:"SQL", diff:"Junior", q:"Explain the difference between INNER JOIN, LEFT JOIN, RIGHT JOIN, and FULL OUTER JOIN.",
   a:`<ul><li><strong>INNER JOIN</strong> — only matching rows from both tables.</li><li><strong>LEFT JOIN</strong> — all rows from the left table; nulls for unmatched right rows.</li><li><strong>RIGHT JOIN</strong> — all rows from the right table; nulls for unmatched left rows.</li><li><strong>FULL OUTER JOIN</strong> — all rows from both tables; nulls where no match exists.</li></ul><p>In analytics, LEFT JOIN is most common when preserving all records from a primary table.</p>`},

  {cat:"SQL", diff:"Mid", q:"Write a SQL query to find the second-highest salary in an employees table.",
   a:`<pre>-- Method 1: DENSE_RANK (preferred)
SELECT salary
FROM (
  SELECT salary, DENSE_RANK() OVER (ORDER BY salary DESC) AS rk
  FROM employees
) ranked
WHERE rk = 2;

-- Method 2: Subquery
SELECT MAX(salary) FROM employees
WHERE salary < (SELECT MAX(salary) FROM employees);</pre><p>Window functions are preferred in production — they handle ties correctly and are easier to generalise to Nth salary.</p>`},

  {cat:"SQL", diff:"Mid", q:"What are window functions and when would you use them over GROUP BY?",
   a:`<p>Window functions perform calculations across a set of rows related to the current row <em>without collapsing</em> the result set.</p><pre>SELECT employee_id, department,
  salary,
  AVG(salary) OVER (PARTITION BY department) AS dept_avg,
  RANK() OVER (PARTITION BY department ORDER BY salary DESC) AS dept_rank
FROM employees;</pre><p>Use window functions when you need both detail rows <em>and</em> aggregated context simultaneously — e.g. ranking, running totals, moving averages, lead/lag analysis.</p>`},

  {cat:"SQL", diff:"Mid", q:"How do you detect and handle duplicate records in a large dataset using SQL?",
   a:`<pre>-- Identify duplicates
SELECT email, COUNT(*) AS cnt
FROM users
GROUP BY email HAVING cnt > 1;

-- Keep latest record using ROW_NUMBER
DELETE FROM users
WHERE id NOT IN (
  SELECT MIN(id) FROM users GROUP BY email
);

-- Or with CTE
WITH cte AS (
  SELECT *, ROW_NUMBER() OVER (PARTITION BY email ORDER BY created_at DESC) AS rn
  FROM users
)
DELETE FROM cte WHERE rn > 1;</pre>`},

  {cat:"SQL", diff:"Senior", q:"Explain query optimisation strategies you would use on a slow-running analytical query.",
   a:`<ul><li><strong>Indexes</strong> — add on frequently filtered/joined columns; avoid full scans.</li><li><strong>Partitioning</strong> — partition large tables by date so queries touch fewer data blocks.</li><li><strong>Avoid SELECT *</strong> — select only needed columns to reduce I/O.</li><li><strong>Filter early</strong> — push WHERE clauses into CTEs or subqueries to reduce data before joins.</li><li><strong>Materialised views</strong> — pre-compute expensive aggregations.</li><li><strong>EXPLAIN / EXPLAIN ANALYZE</strong> — examine the query plan to find full scans, hash joins on large sets, or nested loops.</li><li><strong>Statistics</strong> — ensure the query planner has up-to-date column statistics (ANALYZE in Postgres).</li></ul>`},

  {cat:"SQL", diff:"Senior", q:"Design a SQL schema to track daily active users (DAU) and monthly active users (MAU) efficiently.",
   a:`<pre>-- Event table (append-only log)
CREATE TABLE user_events (
  user_id   BIGINT,
  event_date DATE,
  event_type VARCHAR(50),
  PRIMARY KEY (user_id, event_date, event_type)
);

-- DAU aggregate (materialized daily)
CREATE TABLE dau_summary AS
SELECT event_date, COUNT(DISTINCT user_id) AS dau
FROM user_events GROUP BY event_date;

-- MAU query
SELECT DATE_TRUNC('month', event_date) AS month,
  COUNT(DISTINCT user_id) AS mau
FROM user_events GROUP BY 1 ORDER BY 1;</pre><p>Index <code>user_id</code> and <code>event_date</code> separately; partition by month for scale.</p>`},

  // ─── Statistics ───
  {cat:"Statistics", diff:"Junior", q:"What is the difference between mean, median, and mode? When is each preferred?",
   a:`<ul><li><strong>Mean</strong> — arithmetic average. Best for symmetric, normally distributed data with no outliers.</li><li><strong>Median</strong> — middle value. Preferred when data is skewed (e.g. income, house prices) — robust to outliers.</li><li><strong>Mode</strong> — most frequent value. Useful for categorical data or finding the most common outcome.</li></ul><p>Example: reporting average salary is misleading when a few executives skew the distribution — median salary is more representative.</p>`},

  {cat:"Statistics", diff:"Junior", q:"Explain the concept of a p-value in plain English for a non-technical stakeholder.",
   a:`<p>A p-value answers: "If there were truly no effect, how likely would we see data this extreme by chance alone?"</p><p>A p-value of 0.03 means there is only a 3% chance of observing our results if the null hypothesis (no difference) were true. Conventionally, p < 0.05 is considered statistically significant — meaning we reject the null hypothesis.</p><p><strong>Important</strong>: p-value is NOT the probability that the null hypothesis is true, nor the probability that results are due to chance. It is also not a measure of practical significance.</p>`},

  {cat:"Statistics", diff:"Mid", q:"What is the Central Limit Theorem and why is it important for data analysis?",
   a:`<p>The CLT states that the sampling distribution of the sample mean approaches a normal distribution as sample size increases, regardless of the population's underlying distribution.</p><p><strong>Why it matters</strong>: It justifies using normal-distribution-based inference (t-tests, confidence intervals, z-scores) even when we don't know the true population distribution — as long as n is large enough (typically n ≥ 30).</p><p>Practical implication: we can build confidence intervals around metrics like conversion rate or revenue per user without needing the data to be normally distributed.</p>`},

  {cat:"Statistics", diff:"Mid", q:"What is the difference between Type I and Type II errors? How do you control for them?",
   a:`<ul><li><strong>Type I (False Positive, α)</strong> — rejecting H₀ when it's actually true. Controlled by setting significance level α (e.g. 0.05).</li><li><strong>Type II (False Negative, β)</strong> — failing to reject H₀ when it's actually false. Related to statistical power = 1 − β.</li></ul><p>Trade-off: lowering α reduces Type I errors but increases Type II. You manage this by increasing sample size, which raises power without inflating α.</p><p>In A/B testing: Type I = declaring a winner that isn't; Type II = missing a real improvement.</p>`},

  {cat:"Statistics", diff:"Mid", q:"Explain correlation vs. causation with a real-world example.",
   a:`<p>Correlation means two variables move together. Causation means one variable directly causes a change in another.</p><p><strong>Classic example</strong>: Ice cream sales and drowning rates are positively correlated — both rise in summer. But eating ice cream doesn't cause drowning; the confounding variable is hot weather.</p><p>To establish causation you need: controlled experiments (A/B tests), randomised assignment, or causal inference methods like difference-in-differences, instrumental variables, or regression discontinuity.</p>`},

  {cat:"Statistics", diff:"Senior", q:"How would you design an A/B test for a new checkout flow to ensure statistically valid results?",
   a:`<ul><li><strong>Define metric</strong> — primary KPI (conversion rate) and guardrail metrics (revenue, bounce rate).</li><li><strong>Power analysis</strong> — determine minimum detectable effect (MDE), significance α (0.05), power (0.8) → compute required sample size per variant.</li><li><strong>Randomisation unit</strong> — user-level (not session-level) to avoid contamination.</li><li><strong>Duration</strong> — run for at least one full business cycle (typically 2 weeks) to capture weekly seasonality.</li><li><strong>Checks</strong> — SRM (Sample Ratio Mismatch) test, AA test validation, novelty effect monitoring.</l
